<ion-header [translucent]="true">
  <ion-toolbar color="dark">
    <ion-title style="font-weight: bold;">MI COMPRA 🛍️</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" color="light">
  
  <div *ngIf="cartService.getCarrito().length === 0" style="text-align: center; margin-top: 80px;">
    <ion-icon name="cart-outline" style="font-size: 100px; color: #b5b5b5;"></ion-icon>
    <h2 style="color: #666; font-weight: bold; margin-top: 20px;">Tu carrito está vacío</h2>
    <p style="color: #888;">¡Descubre nuestros productos y date un capricho!</p>
    <ion-button shape="round" color="primary" routerLink="/tabs/tab1" style="margin-top: 20px;">
      Ir a la tienda
    </ion-button>
  </div>

  <ion-list *ngIf="cartService.getCarrito().length > 0" style="background: transparent; padding: 10px;">
    
    <ion-card *ngFor="let item of cartService.getCarrito(); let i = index" style="border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.08);">
      <ion-item lines="none" style="--background: transparent;">
        
        <ion-thumbnail slot="start" style="--border-radius: 8px; width: 60px; height: 60px;">
          <img [src]="item.foto" style="object-fit: cover;" />
        </ion-thumbnail>
        
        <ion-label>
          <h2 style="font-weight: bold; font-size: 1.1rem; margin-bottom: 5px;">{{ item.nombre }}</h2>
          <p style="color: #666;">Precio: <span style="font-weight: bold; color: var(--ion-color-success);">{{ item.precio }} €</span></p>
        </ion-label>
        
        <ion-button fill="clear" color="danger" slot="end" (click)="cartService.eliminarProducto(i)">
          <ion-icon slot="icon-only" name="trash-outline"></ion-icon>
        </ion-button>

      </ion-item>
    </ion-card>

  </ion-list>
</ion-content>

<ion-footer *ngIf="cartService.getCarrito().length > 0" class="ion-no-border">
  <ion-toolbar style="--background: white; border-top-left-radius: 20px; border-top-right-radius: 20px; box-shadow: 0 -4px 15px rgba(0,0,0,0.05); padding: 10px;">
    
    <ion-title slot="start" style="font-size: 1.3rem;">
      <span style="color: #888; font-size: 1rem; font-weight: normal;">Total:</span><br>
      <strong style="color: var(--ion-color-dark);">{{ total }} €</strong>
    </ion-title>
    
    <ion-button slot="end" shape="round" color="success" size="large" (click)="finalizarCompra()" style="font-weight: bold; margin-right: 10px;">
      <ion-icon slot="start" name="card-outline"></ion-icon>
      PAGAR
    </ion-button>

  </ion-toolbar>
</ion-footer>
